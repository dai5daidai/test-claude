<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シンプル インベーダーゲーム</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #161d33;
      --text: #f5f7ff;
      --accent: #60a5fa;
      --danger: #fb7185;
      --ok: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #192448 0%, var(--bg) 55%);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .wrap {
      width: min(100%, 760px);
      background: color-mix(in oklab, var(--panel), black 8%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 600;
      font-size: 14px;
    }
    .badge strong { color: var(--accent); }
    #game {
      width: 100%;
      height: auto;
      display: block;
      background: #060912;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }
    .controls {
      margin-top: 12px;
      color: #cdd5f6;
      font-size: 14px;
      line-height: 1.6;
    }
    .controls kbd {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-bottom-width: 2px;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #fff;
    }
    #message {
      margin-top: 10px;
      font-weight: 600;
      min-height: 1.2em;
      color: var(--ok);
    }
    #message.danger { color: var(--danger); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="header">
      <h1>👾 インベーダーゲーム</h1>
      <div class="stats">
        <div class="badge">SCORE: <strong id="score">0</strong></div>
        <div class="badge">LIFE: <strong id="life">3</strong></div>
        <div class="badge">LEVEL: <strong id="level">1</strong></div>
      </div>
    </div>

    <canvas id="game" width="720" height="480" aria-label="invader game"></canvas>

    <p class="controls">
      移動: <kbd>←</kbd> <kbd>→</kbd> または <kbd>A</kbd> <kbd>D</kbd> ／ 発射: <kbd>Space</kbd> ／ リスタート: <kbd>R</kbd>
    </p>
    <p id="message"></p>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const lifeEl = document.getElementById('life');
    const levelEl = document.getElementById('level');
    const messageEl = document.getElementById('message');

    const keys = new Set();
    const rand = (min, max) => Math.random() * (max - min) + min;

    const state = {
      running: true,
      score: 0,
      life: 3,
      level: 1,
      player: { x: canvas.width / 2 - 24, y: canvas.height - 36, w: 48, h: 16, speed: 5 },
      bullets: [],
      enemyBullets: [],
      enemies: [],
      enemyDir: 1,
      enemySpeed: 0.8,
      shootCooldown: 0,
      enemyShootCooldown: 0
    };

    function buildEnemies() {
      state.enemies = [];
      const rows = 4 + Math.min(2, state.level - 1);
      const cols = 10;
      const startX = 70;
      const startY = 70;
      const gapX = 56;
      const gapY = 44;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          state.enemies.push({
            x: startX + c * gapX,
            y: startY + r * gapY,
            w: 34,
            h: 22,
            alive: true,
            color: `hsl(${190 + r * 30}, 85%, 62%)`
          });
        }
      }
      state.enemyDir = 1;
      state.enemySpeed = 0.8 + (state.level - 1) * 0.25;
    }

    function resetGame() {
      state.running = true;
      state.score = 0;
      state.life = 3;
      state.level = 1;
      state.player.x = canvas.width / 2 - state.player.w / 2;
      state.bullets = [];
      state.enemyBullets = [];
      state.shootCooldown = 0;
      state.enemyShootCooldown = 0;
      messageEl.textContent = '';
      messageEl.classList.remove('danger');
      buildEnemies();
      updateHUD();
    }

    function updateHUD() {
      scoreEl.textContent = state.score;
      lifeEl.textContent = state.life;
      levelEl.textContent = state.level;
    }

    function rectHit(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
      if (!state.running) return;

      if (keys.has('ArrowLeft') || keys.has('a') || keys.has('A')) state.player.x -= state.player.speed;
      if (keys.has('ArrowRight') || keys.has('d') || keys.has('D')) state.player.x += state.player.speed;
      state.player.x = Math.max(8, Math.min(canvas.width - state.player.w - 8, state.player.x));

      if (state.shootCooldown > 0) state.shootCooldown--;
      if ((keys.has(' ') || keys.has('Space')) && state.shootCooldown <= 0) {
        state.bullets.push({ x: state.player.x + state.player.w / 2 - 2, y: state.player.y - 10, w: 4, h: 10, vy: -7 });
        state.shootCooldown = 14;
      }

      for (const b of state.bullets) b.y += b.vy;
      state.bullets = state.bullets.filter(b => b.y + b.h > 0);

      for (const b of state.enemyBullets) b.y += b.vy;
      state.enemyBullets = state.enemyBullets.filter(b => b.y < canvas.height + 12);

      const alive = state.enemies.filter(e => e.alive);
      if (alive.length === 0) {
        state.level++;
        state.bullets = [];
        state.enemyBullets = [];
        buildEnemies();
        updateHUD();
        return;
      }

      let minX = Infinity;
      let maxX = -Infinity;
      for (const e of alive) {
        e.x += state.enemyDir * state.enemySpeed;
        minX = Math.min(minX, e.x);
        maxX = Math.max(maxX, e.x + e.w);
      }

      if (minX < 8 || maxX > canvas.width - 8) {
        state.enemyDir *= -1;
        for (const e of alive) e.y += 14;
      }

      if (state.enemyShootCooldown > 0) state.enemyShootCooldown--;
      if (state.enemyShootCooldown <= 0 && alive.length > 0) {
        const shooter = alive[Math.floor(rand(0, alive.length))];
        state.enemyBullets.push({ x: shooter.x + shooter.w / 2 - 2, y: shooter.y + shooter.h, w: 4, h: 10, vy: 3.2 + state.level * 0.15 });
        state.enemyShootCooldown = Math.max(28, 70 - state.level * 5);
      }

      for (const bullet of state.bullets) {
        for (const enemy of alive) {
          if (!enemy.alive) continue;
          if (rectHit(bullet, enemy)) {
            enemy.alive = false;
            bullet.y = -999;
            state.score += 10;
            break;
          }
        }
      }
      state.bullets = state.bullets.filter(b => b.y > -100);

      for (const eb of state.enemyBullets) {
        if (rectHit(eb, state.player)) {
          eb.y = canvas.height + 999;
          state.life--;
          if (state.life <= 0) {
            state.running = false;
            messageEl.textContent = 'ゲームオーバー！ Rキーでリスタート';
            messageEl.classList.add('danger');
          }
        }
      }

      for (const e of alive) {
        if (e.y + e.h >= state.player.y) {
          state.running = false;
          messageEl.textContent = 'インベーダーが到達しました… Rキーでリスタート';
          messageEl.classList.add('danger');
          break;
        }
      }

      updateHUD();
    }

    function drawPlayer() {
      const p = state.player;
      ctx.fillStyle = '#60a5fa';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#bfdbfe';
      ctx.fillRect(p.x + p.w / 2 - 6, p.y - 8, 12, 8);
    }

    function drawEnemy(e) {
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = '#020617';
      ctx.fillRect(e.x + 6, e.y + 6, 5, 5);
      ctx.fillRect(e.x + e.w - 11, e.y + 6, 5, 5);
      ctx.fillRect(e.x + 11, e.y + 14, e.w - 22, 4);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#04070f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // star field
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      for (let i = 0; i < 70; i++) {
        const x = (i * 97) % canvas.width;
        const y = (i * 61 + performance.now() * 0.02) % canvas.height;
        ctx.fillRect(x, y, 1.6, 1.6);
      }

      drawPlayer();

      for (const e of state.enemies) {
        if (e.alive) drawEnemy(e);
      }

      ctx.fillStyle = '#fef08a';
      for (const b of state.bullets) ctx.fillRect(b.x, b.y, b.w, b.h);

      ctx.fillStyle = '#fb7185';
      for (const b of state.enemyBullets) ctx.fillRect(b.x, b.y, b.w, b.h);

      if (!state.running) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') e.preventDefault();
      keys.add(e.key);
      keys.add(e.code);
      if ((e.key === 'r' || e.key === 'R') && !state.running) resetGame();
    });

    window.addEventListener('keyup', (e) => {
      keys.delete(e.key);
      keys.delete(e.code);
    });

    resetGame();
    loop();
  </script>
</body>
</html>
