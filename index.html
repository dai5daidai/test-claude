<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
      padding: 2.5rem;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #4f8ef7;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #fff;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .bio {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .tag {
      background: #eef3ff;
      color: #4f8ef7;
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.85rem;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .links a {
      text-decoration: none;
      color: #4f8ef7;
      font-size: 0.9rem;
      border: 1px solid #4f8ef7;
      border-radius: 6px;
      padding: 0.4rem 1rem;
      transition: background 0.2s, color 0.2s;
    }

    .links a:hover {
      background: #4f8ef7;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>
    <h1>あなたの名前</h1>
    <p class="subtitle">エンジニア / デザイナー</p>
    <p class="bio">
      はじめまして！ Web 開発が好きなエンジニアです。<br>
      新しい技術を試すことが大好きで、このリポジトリでは<br>
      Claude Code を使ったアイデアを色々と実験しています。
    </p>
    <div class="tags">
      <span class="tag">JavaScript</span>
      <span class="tag">Python</span>
      <span class="tag">React</span>
      <span class="tag">AI / ML</span>
    </div>
    <div class="links">
      <a href="https://github.com/dai5daidai">GitHub</a>
      <a href="mailto:you@example.com">メール</a>
    </div>
  </div>
</body>
</html>
